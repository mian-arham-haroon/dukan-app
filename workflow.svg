<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="32" fill="#0F172A"/>
  <text x="70" y="78" font-family="Arial" font-size="42" font-weight="900" fill="#FFFFFF">Core Shopkeeper Workflow</text>
  <text x="70" y="120" font-family="Arial" font-size="22" fill="#CBD5E1">One sale must update invoice, stock, cashbook, udhaar, reports, and cloud sync.</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#67E8F9"/></marker>
  </defs>
  <g font-family="Arial" font-size="22" font-weight="800">
    <rect x="70" y="210" width="180" height="86" rx="22" fill="#155E75"/>
    <text x="108" y="263" fill="#FFFFFF">Invoice</text>
    <rect x="320" y="210" width="180" height="86" rx="22" fill="#166534"/>
    <text x="366" y="263" fill="#FFFFFF">Stock</text>
    <rect x="570" y="210" width="180" height="86" rx="22" fill="#854D0E"/>
    <text x="606" y="263" fill="#FFFFFF">Payment</text>
    <rect x="820" y="210" width="180" height="86" rx="22" fill="#7F1D1D"/>
    <text x="858" y="263" fill="#FFFFFF">Udhaar</text>
    <rect x="1070" y="210" width="140" height="86" rx="22" fill="#312E81"/>
    <text x="1100" y="263" fill="#FFFFFF">Sync</text>
  </g>
  <g stroke="#67E8F9" stroke-width="5" marker-end="url(#arrow)">
    <path d="M255 253 H310"/>
    <path d="M505 253 H560"/>
    <path d="M755 253 H810"/>
    <path d="M1005 253 H1060"/>
  </g>
  <g font-family="Arial" font-size="20" fill="#CBD5E1">
    <text x="70" y="360">1. Select customer or walk-in</text>
    <text x="70" y="402">2. Add products and quantity</text>
    <text x="70" y="444">3. Save invoice</text>
    <text x="470" y="360">4. Reduce stock automatically</text>
    <text x="470" y="402">5. Save payment / balance</text>
    <text x="470" y="444">6. Update cashbook and udhaar</text>
    <text x="860" y="360">7. Reports reconcile totals</text>
    <text x="860" y="402">8. Queue cloud sync</text>
    <text x="860" y="444">9. Retry if network fails</text>
  </g>
  <rect x="70" y="535" width="1140" height="88" rx="22" fill="#FFFFFF" fill-opacity="0.08"/>
  <text x="110" y="586" font-family="Arial" font-size="24" font-weight="800" fill="#FFFFFF">Rule: never silently edit posted money/stock records. Use voids, returns, payments, and ledger entries.</text>
</svg>
