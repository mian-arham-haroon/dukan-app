<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="760" rx="32" fill="#F8FAFC"/>
  <text x="70" y="80" font-family="Arial" font-size="42" font-weight="900" fill="#0F172A">System Architecture</text>
  <text x="70" y="122" font-family="Arial" font-size="22" fill="#475569">Local-first mobile app with SQLite storage, sync queue, and Supabase cloud backend.</text>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0F172A"/></marker>
  </defs>
  <g filter="url(#s)">
    <rect x="70" y="190" width="300" height="210" rx="26" fill="#FFFFFF"/>
    <text x="105" y="242" font-family="Arial" font-size="28" font-weight="800" fill="#0F172A">Mobile App</text>
    <text x="105" y="286" font-family="Arial" font-size="20" fill="#475569">React Native + Expo</text>
    <text x="105" y="322" font-family="Arial" font-size="20" fill="#475569">TypeScript UI</text>
    <text x="105" y="358" font-family="Arial" font-size="20" fill="#475569">React Navigation</text>
  </g>
  <g filter="url(#s)">
    <rect x="490" y="190" width="300" height="210" rx="26" fill="#FFFFFF"/>
    <text x="525" y="242" font-family="Arial" font-size="28" font-weight="800" fill="#0F172A">Local Layer</text>
    <text x="525" y="286" font-family="Arial" font-size="20" fill="#475569">SQLite Database</text>
    <text x="525" y="322" font-family="Arial" font-size="20" fill="#475569">Repositories</text>
    <text x="525" y="358" font-family="Arial" font-size="20" fill="#475569">Offline sync_queue</text>
  </g>
  <g filter="url(#s)">
    <rect x="910" y="190" width="300" height="210" rx="26" fill="#FFFFFF"/>
    <text x="945" y="242" font-family="Arial" font-size="28" font-weight="800" fill="#0F172A">Cloud Layer</text>
    <text x="945" y="286" font-family="Arial" font-size="20" fill="#475569">Supabase Auth</text>
    <text x="945" y="322" font-family="Arial" font-size="20" fill="#475569">PostgreSQL + RLS</text>
    <text x="945" y="358" font-family="Arial" font-size="20" fill="#475569">Backup / Restore</text>
  </g>
  <path d="M380 295 H480" stroke="#0F172A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M800 295 H900" stroke="#0F172A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M900 337 H800" stroke="#0F172A" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <path d="M480 337 H380" stroke="#0F172A" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <g filter="url(#s)">
    <rect x="160" y="510" width="960" height="150" rx="26" fill="#0F172A"/>
    <text x="210" y="565" font-family="Arial" font-size="26" font-weight="800" fill="#FFFFFF">Data Flow</text>
    <text x="210" y="610" font-family="Arial" font-size="22" fill="#CFFAFE">Save locally first → queue sync action → push to cloud → mark synced / retry failed items.</text>
  </g>
</svg>
